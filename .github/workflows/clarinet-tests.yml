name: Clarinet Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Clarinet Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v1.x

    - name: Install Clarinet
      uses: hirosystems/clarinet-action@v1.4.0

    - name: Run Tests
      run: clarinet test
